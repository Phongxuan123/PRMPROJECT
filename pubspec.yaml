name: prm_project
description: "He thong quan ly chuoi sieu thi mini tich hop ban hang online (Flutter + Firebase)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase core (bat buoc khoi tao truoc)
  firebase_core: ^3.6.0

  # Authentication
  firebase_auth: ^5.3.1

  # Database
  cloud_firestore: ^5.4.4

  # HTTP client (dung cho Cloudinary upload)
  http: ^1.2.2

  # Push notifications
  firebase_messaging: ^15.1.3

  # State management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.2.7

  # Image picker (de upload anh san pham)
  image_picker: ^1.1.2

  # UI utilities
  cached_network_image: ^3.4.1

  # Dinh dang ngay thang / tien te
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
